<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Avgångar">
<meta name="theme-color" content="#0a0f1e">
<link rel="manifest" href="manifest.json">
<title>SL Avgångar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d47;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #f0f4ff;
    --muted: #64748b;
    --sans: 'DM Sans', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  body {
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--safe-bottom) + 24px);
  }

  /* ── Header ── */
  .header {
    padding: 18px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: var(--safe-top);
    z-index: 100;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .clock {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .refresh-btn:active { color: var(--accent2); border-color: var(--accent2); }
  .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Update banner ── */
  .update-banner {
    display: none;
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 12px;
    margin: 0 14px 12px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    text-align: center;
  }
  .update-banner.visible { display: block; }

  /* ── Main ── */
  .main { padding: 0 14px; }

  /* ── Station block ── */
  .station-block { margin-bottom: 20px; }

  .station-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .station-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    flex: 1;
  }

  .station-dir {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    white-space: nowrap;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.25; } }

  /* ── Departure card ── */
  .departure-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    margin-bottom: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s;
    animation: fadeUp 0.2s ease both;
  }
  .departure-card:active { border-color: var(--accent); }
  .departure-card.expanded { border-color: rgba(59,130,246,0.4); }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(6px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .card-summary {
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .line-badge {
    min-width: 54px; height: 54px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    font-weight: 700;
    flex-shrink: 0;
    padding: 0 6px;
    letter-spacing: -0.01em;
  }

  .dep-info { flex: 1; min-width: 0; }

  .dep-dest {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .dep-sub { font-size: 12px; font-weight: 500; color: var(--muted); }

  .dep-cancelled {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--red);
    background: rgba(239,68,68,0.12);
    border-radius: 6px;
    padding: 2px 8px;
  }

  .dep-time { text-align: right; flex-shrink: 0; min-width: 64px; }

  .dep-mins {
    font-size: 38px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    margin-bottom: 1px;
  }

  .dep-unit { font-size: 12px; font-weight: 500; color: var(--muted); }

  .c-green  { color: var(--green); }
  .c-orange { color: #f97316; }
  .c-red    { color: var(--red); }
  .c-text   { color: var(--text); }

  .chevron {
    font-size: 14px;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.25s;
    margin-left: -8px;
  }
  .departure-card.expanded .chevron { transform: rotate(180deg); }

  /* ── Expanded panel ── */
  .card-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .departure-card.expanded .card-detail { max-height: 300px; }

  .detail-inner {
    border-top: 1px solid var(--border);
    padding: 16px 18px 18px;
  }

  .timeline { display: flex; flex-direction: column; gap: 0; margin-bottom: 14px; }

  .tl-row { display: flex; align-items: stretch; gap: 14px; }

  .tl-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 18px;
    flex-shrink: 0;
  }

  .tl-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--bg);
    flex-shrink: 0;
    margin-top: 4px;
  }
  .tl-dot.end { border-color: var(--accent2); }

  .tl-line { flex: 1; width: 2px; background: var(--border); margin: 2px 0; }

  .tl-content { padding-bottom: 16px; flex: 1; }
  .tl-row:last-child .tl-content { padding-bottom: 0; }

  .tl-time {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 2px;
  }

  .tl-label { font-size: 12px; font-weight: 500; color: var(--muted); }

  /* Horisontell tidrad */
  .time-row {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 14px;
  }

  .time-block {
    display: flex;
    flex-direction: column;
  }

  .time-block-time {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 3px;
  }

  .time-block-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
  }

  .time-arrow {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 10px;
    gap: 4px;
  }

  .time-arrow-line {
    width: 100%;
    height: 2px;
    background: var(--border);
    position: relative;
  }

  .time-arrow-line::after {
    content: '›';
    position: absolute;
    right: -6px;
    top: -10px;
    font-size: 18px;
    color: var(--muted);
  }

  .duration-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .detail-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    padding: 4px 0 6px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  .detail-error { color: var(--muted); font-size: 13px; padding: 4px 0 6px; }

  /* ── Misc ── */
  .divider { height: 1px; background: var(--border); margin: 4px 0 20px; }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 18px;
    height: 86px;
    margin-bottom: 8px;
  }
  @keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }

  .error-msg {
    text-align: center;
    padding: 24px 20px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }

  .updated-line {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    padding: 12px 0 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Mina avgångar</div>
  <div class="header-right">
    <div class="clock" id="clock">--:--</div>
    <div class="refresh-btn" id="refreshBtn">↻</div>
  </div>
</div>

<!-- Visas automatiskt när en ny version är tillgänglig -->
<div class="update-banner" id="updateBanner">
  🔄 Ny version tillgänglig – tryck för att uppdatera
</div>

<div class="main" id="main"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// KONFIGURATION
// ═══════════════════════════════════════════════════════════════════
const STATIONS = [
  {
    searchName:      'Näsbypark',
    displayName:     'Näsbypark',
    directionFilter: 'stockholms östra',
    dirLabel:        '→ Stockholms östra',
    destination:     'Stockholms östra',
  },
  {
    searchName:      'Koltrastvägen',
    displayName:     'Koltrastvägen',
    directionFilter: 'täby centrum',
    dirLabel:        '→ Täby centrum',
    destination:     'Täby centrum',
  },
];

// ═══════════════════════════════════════════════════════════════════
const BASE_TRANSPORT = 'https://transport.integration.sl.se/v1';
const BASE_JOURNEY   = 'https://journeyplanner.integration.sl.se/v2';

let resolvedStations = [];
let departureData    = {};
let refreshTimer     = null;
let expandedCardKey  = null;
let detailCache      = {};
let swRegistration   = null;

// ── Service Worker ───────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sl-avgangstavla/service-worker.js')
    .then(reg => {
      swRegistration = reg;

      // Lyssna efter ny SW som väntar på att aktiveras
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Ny version finns – visa banner
            const banner = document.getElementById('updateBanner');
            banner.classList.add('visible');
            banner.addEventListener('click', () => {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
              window.location.reload();
            });
          }
        });
      });
    })
    .catch(err => console.warn('[SW] Registrering misslyckades:', err));

  // Lyssna efter att SW tar över – ladda om sidan
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}

// ── Klocka ───────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

// ── Färger ───────────────────────────────────────────────────────────
const MODE_STYLE = {
  BUS:   { bg:'rgba(59,130,246,0.18)',  color:'#93c5fd' },
  METRO: { bg:'rgba(239,68,68,0.18)',   color:'#fca5a5' },
  TRAM:  { bg:'rgba(34,197,94,0.18)',   color:'#86efac' },
  TRAIN: { bg:'rgba(245,158,11,0.18)',  color:'#fcd34d' },
  SHIP:  { bg:'rgba(6,182,212,0.18)',   color:'#67e8f9' },
};
const modeStyle = m => MODE_STYLE[m] || { bg:'rgba(100,116,139,0.2)', color:'#94a3b8' };

// ── Hjälpfunktioner ──────────────────────────────────────────────────
function getMinutes(dep) {
  const t = dep.expected || dep.scheduled;
  return t ? Math.round((new Date(t) - Date.now()) / 60000) : 9999;
}

function toHHMM(iso) {
  if (!iso) return '--:--';
  return new Date(iso).toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' });
}

function minutesBetween(a, b) {
  if (!a || !b) return null;
  return Math.round((new Date(b) - new Date(a)) / 60000);
}

// ── API ──────────────────────────────────────────────────────────────
async function resolveSiteId(name) {
  const res = await fetch(`${BASE_TRANSPORT}/sites?expand=false`);
  const all = await res.json();
  const q   = name.toLowerCase().trim();
  return (all.find(s => s.name?.toLowerCase() === q)
       || all.find(s => s.name?.toLowerCase().includes(q)))?.id ?? null;
}

async function fetchDepartures(siteId) {
  const res = await fetch(`${BASE_TRANSPORT}/sites/${siteId}/departures`);
  if (!res.ok) return [];
  return (await res.json()).departures || [];
}

async function fetchTripDetail(originName, destName, depTime) {
  const [origRes, destRes] = await Promise.all([
    fetch(`${BASE_JOURNEY}/stop-finder?name_sf=${encodeURIComponent(originName)}&type_sf=any&any_obj_filter_sf=2`),
    fetch(`${BASE_JOURNEY}/stop-finder?name_sf=${encodeURIComponent(destName)}&type_sf=any&any_obj_filter_sf=2`),
  ]);
  const origData = await origRes.json();
  const destData = await destRes.json();

  const origStop = origData?.locations?.[0];
  const destStop = destData?.locations?.[0];
  if (!origStop || !destStop) throw new Error('Hittade inte hållplatser');

  const dt      = new Date(depTime);
  const dateStr = dt.toISOString().slice(0,10).replace(/-/g,'');
  const timeStr = dt.toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' }).replace(':','');

  const tripRes  = await fetch(
    `${BASE_JOURNEY}/trips?type_origin=any&name_origin=${encodeURIComponent(origStop.id)}&` +
    `type_destination=any&name_destination=${encodeURIComponent(destStop.id)}&` +
    `itd_date=${dateStr}&itd_time=${timeStr}&calc_number_of_trips=1`
  );
  const tripData = await tripRes.json();
  const trip     = tripData?.journeys?.[0];
  if (!trip) throw new Error('Ingen resa hittades');

  const legs     = trip.legs || [];
  const first    = legs[0];
  const last     = legs[legs.length - 1];

  return {
    depISO:       first?.origin?.departureTimeEstimated || first?.origin?.departureTimePlanned,
    arrISO:       last?.destination?.arrivalTimeEstimated || last?.destination?.arrivalTimePlanned,
    destStopName: last?.destination?.disassembledName || last?.destination?.name || destName,
  };
}

// ── Render helpers ───────────────────────────────────────────────────
function minsHtmlUnit(dep) {
  const mins      = getMinutes(dep);
  const cancelled = dep.state === 'CANCELLED';
  let minsHtml = '', unitHtml = '';

  if (cancelled) {
    minsHtml = `<span style="font-size:14px;color:var(--red);font-weight:700">INST.</span>`;
  } else if (mins <= 0) {
    minsHtml = `<span class="c-green">Nu</span>`;
  } else if (mins > 59) {
    minsHtml = `<span class="c-text" style="font-size:22px;letter-spacing:-0.01em">${toHHMM(dep.expected||dep.scheduled)}</span>`;
  } else {
    const cls = mins <= 9 ? 'c-red' : mins <= 15 ? 'c-orange' : 'c-text';
    minsHtml  = `<span class="${cls}">${mins}</span>`;
    unitHtml  = 'min';
  }
  return { minsHtml, unitHtml };
}

function renderDetailInner(key) {
  const el = document.querySelector(`[data-key="${key}"] .detail-inner`);
  if (!el) return;

  const detail = detailCache[key];
  if (!detail) {
    el.innerHTML = `<div class="detail-loading"><div class="spinner"></div> Hämtar reseinfo…</div>`;
    return;
  }
  if (detail.error) {
    el.innerHTML = `<div class="detail-error">⚠ ${detail.error}</div>`;
    return;
  }

  const dur    = minutesBetween(detail.depISO, detail.arrISO);
  const durStr = dur ? `${dur} min` : '–';

  el.innerHTML = `
    <div class="time-row">
      <div class="time-block">
        <div class="time-block-time">${toHHMM(detail.depISO)}</div>
        <div class="time-block-label">Avgång</div>
      </div>
      <div class="time-arrow">
        <div class="time-arrow-line"></div>
      </div>
      <div class="time-block" style="text-align:right">
        <div class="time-block-time">${toHHMM(detail.arrISO)}</div>
        <div class="time-block-label">Ankomst · ${detail.destStopName}</div>
      </div>
    </div>
    <div class="duration-pill">⏱ Restid ${durStr}</div>`;
}

// ── Render ───────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  let html = '';

  if (!resolvedStations.length) {
    html = STATIONS.map(() => `
      <div class="station-block">
        <div class="skeleton"></div>
        <div class="skeleton" style="animation-delay:.1s"></div>
      </div>`).join('<div class="divider"></div>');
    main.innerHTML = html;
    return;
  }

  resolvedStations.forEach((st, si) => {
    const rawDeps = departureData[st.siteId];

    html += `<div class="station-block">
      <div class="station-label">
        <div class="live-dot"></div>
        <div class="station-name">${st.displayName}</div>
        <div class="station-dir">${st.dirLabel}</div>
      </div>`;

    if (rawDeps === null) {
      html += `<div class="skeleton"></div><div class="skeleton" style="animation-delay:.1s"></div>`;
    } else {
      const deps = rawDeps
        .filter(d => (d.destination||d.direction||'').toLowerCase().includes(st.directionFilter))
        .filter(d => getMinutes(d) >= -1)
        .slice(0, 5);

      if (!deps.length) {
        html += `<div class="error-msg">Inga avgångar mot ${st.dirLabel.replace('→ ','')}</div>`;
      } else {
        deps.forEach((dep, di) => {
          const key       = `${si}-${di}`;
          const mode      = dep.line?.transport_mode || 'BUS';
          const s         = modeStyle(mode);
          const line      = dep.line?.designation || '?';
          const dest      = dep.destination || dep.direction || '–';
          const cancelled = dep.state === 'CANCELLED';
          const expanded  = expandedCardKey === key;
          const { minsHtml, unitHtml } = minsHtmlUnit(dep);

          html += `
            <div class="departure-card ${expanded ? 'expanded' : ''}" data-key="${key}"
                 data-si="${si}" data-di="${di}" style="animation-delay:${di*0.05}s">
              <div class="card-summary">
                <div class="line-badge" style="background:${s.bg};color:${s.color}">${line}</div>
                <div class="dep-info">
                  <div class="dep-dest">${dest}</div>
                  <div class="dep-sub">${mode}</div>
                  ${cancelled ? '<span class="dep-cancelled">INSTÄLLD</span>' : ''}
                </div>
                <div class="dep-time">
                  <div class="dep-mins">${minsHtml}</div>
                  <div class="dep-unit">${unitHtml}</div>
                </div>
                <div class="chevron">▼</div>
              </div>
              <div class="card-detail">
                <div class="detail-inner"></div>
              </div>
            </div>`;
        });
      }
    }

    html += `</div>`;
    if (si < resolvedStations.length - 1) html += `<div class="divider"></div>`;
  });

  const now = new Date().toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit' });
  html += `<div class="updated-line">Uppdaterad ${now} · auto-refresh var 20s</div>`;
  main.innerHTML = html;

  if (expandedCardKey) renderDetailInner(expandedCardKey);

  document.querySelectorAll('.departure-card').forEach(card => {
    card.addEventListener('click', () => handleCardClick(card));
  });
}

// ── Kortklick ────────────────────────────────────────────────────────
async function handleCardClick(card) {
  const key = card.dataset.key;
  const si  = parseInt(card.dataset.si);
  const di  = parseInt(card.dataset.di);

  if (expandedCardKey === key) {
    expandedCardKey = null;
    card.classList.remove('expanded');
    return;
  }

  if (expandedCardKey) {
    const prev = document.querySelector(`[data-key="${expandedCardKey}"]`);
    if (prev) prev.classList.remove('expanded');
  }

  expandedCardKey = key;
  card.classList.add('expanded');
  renderDetailInner(key);

  if (!detailCache[key]) {
    const st  = resolvedStations[si];
    const dep = departureData[st.siteId]
      ?.filter(d => (d.destination||d.direction||'').toLowerCase().includes(st.directionFilter))
      ?.filter(d => getMinutes(d) >= -1)?.[di];

    if (!dep) {
      detailCache[key] = { error: 'Avgångsinformation saknas' };
      renderDetailInner(key);
      return;
    }

    try {
      detailCache[key] = await fetchTripDetail(st.displayName, st.destination, dep.expected || dep.scheduled);
    } catch (e) {
      detailCache[key] = { error: 'Kunde inte hämta reseinfo' };
    }
    renderDetailInner(key);
  }
}

// ── Hämta avgångar ───────────────────────────────────────────────────
async function loadDepartures() {
  clearTimeout(refreshTimer);
  detailCache     = {};
  expandedCardKey = null;

  await Promise.all(resolvedStations.map(async st => {
    try { departureData[st.siteId] = await fetchDepartures(st.siteId); }
    catch { departureData[st.siteId] = []; }
  }));

  render();
  refreshTimer = setTimeout(loadDepartures, 20000);
}

// ── Start ────────────────────────────────────────────────────────────
async function init() {
  render();
  try {
    const resolved = await Promise.all(
      STATIONS.map(async cfg => {
        const siteId = await resolveSiteId(cfg.searchName);
        if (!siteId) throw new Error(`Hittade inte: ${cfg.searchName}`);
        return { ...cfg, siteId };
      })
    );
    resolvedStations = resolved;
    resolved.forEach(s => { departureData[s.siteId] = null; });
    render();
    await loadDepartures();
  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div class="error-msg">⚠ ${e.message}</div>`;
  }
}

document.getElementById('refreshBtn').addEventListener('click', async () => {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await loadDepartures();
  btn.classList.remove('spinning');
});

init();
</script>
